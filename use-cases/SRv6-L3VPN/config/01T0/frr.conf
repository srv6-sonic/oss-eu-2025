frr defaults traditional
hostname 01T0
!
log stdout notifications
log commands
!
no fpm use-next-hop-groups
!
fpm address 127.0.0.1
zebra nexthop-group keep 1
!
vrf Vrf9
 ipv6 route fcbb:bbbb:A001::/48 2001:db8:1:A001::A001
exit-vrf
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 no bgp network import-check
 bgp bestpath as-path multipath-relax
 neighbor 2001:db8:1:1001::1001 remote-as 65011
 neighbor 2001:db8:1:1001::1001 timers 3 10
 neighbor 2001:db8:1:1001::1001 timers connect 1
 neighbor 2001:db8:1:1001::1001 capability extended-nexthop
 neighbor 2001:db8:1:1001::1001 disable-connected-check
 neighbor 2001:db8:1:1002::1002 remote-as 65012
 neighbor 2001:db8:1:1002::1002 timers 3 10
 neighbor 2001:db8:1:1002::1002 timers connect 1
 neighbor 2001:db8:1:1002::1002 capability extended-nexthop
 neighbor 2001:db8:1:1002::1002 disable-connected-check
 !
 address-family ipv6 unicast
  network fcbb:bbbb:1::/48
  network fcbb:bbbb:1::1/128
  neighbor 2001:db8:1:1001::1001 activate
  neighbor 2001:db8:1:1002::1002 activate
 exit-address-family
 !
 address-family ipv6 vpn
  neighbor 2001:db8:1:1001::1001 activate
  neighbor 2001:db8:1:1002::1002 activate
 exit-address-family
 !
 segment-routing srv6
  locator MAIN
  encap-behavior H_Encaps_Red
 exit
exit
!
router bgp 65001 vrf Vrf9
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 sid vpn per-vrf export auto
 !
 address-family ipv6 unicast
  rd vpn export 1:9
  rt vpn both 99:99
  import vpn
  export vpn
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family ipv4 unicast
  rd vpn export 1:9
  rt vpn both 99:99
  import vpn
  export vpn
  redistribute connected
  redistribute static
 exit-address-family
exit
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix fcbb:bbbb:1::/48
    format usid-f3216
   exit
  exit
  !
  encapsulation
   source-address fcbb:bbbb:1::1
  exit
 exit
exit
!
ip forwarding
ipv6 forwarding
!
line vty
!
